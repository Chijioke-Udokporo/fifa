<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIFA World Cup 2026 Schedule</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#050505">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="icon" type="image/jpeg" href="icon.jpg">
    <link rel="apple-touch-icon" href="icon.jpg">
    <link href="https://api.fontshare.com/v2/css?f[]=clash-display@400,500,600,700&f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #050505;
            --bg-surface: #0f0f11;
            --bg-surface-hover: #1a1a1c;
            --border-dim: #222224;
            --border-bright: #333336;
            --text-primary: #ffffff;
            --text-secondary: #a1a1aa;
            --text-tertiary: #71717a;
            --accent-primary: #ccff00;
            --accent-rgb: 204, 255, 0;
            --font-display: 'Clash Display', sans-serif;
            --font-body: 'Satoshi', sans-serif;
            --radius-sm: 6px;
            --radius-md: 12px;
        }

        :root[data-theme="light"] {
            --bg-base: #f4f4f5;
            --bg-surface: #ffffff;
            --bg-surface-hover: #fafafa;
            --border-dim: #e4e4e7;
            --border-bright: #d4d4d8;
            --text-primary: #18181b;
            --text-secondary: #52525b;
            --text-tertiary: #a1a1aa;
            --accent-primary: #2563eb;
            --accent-rgb: 37, 99, 235;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
        body { background-color: var(--bg-base); color: var(--text-primary); font-family: var(--font-body); min-height: 100vh; display: flex; justify-content: center; background-image: radial-gradient(circle at 15% 50%, rgba(var(--accent-rgb), 0.03) 0%, transparent 50%), radial-gradient(circle at 85% 30%, rgba(37, 99, 235, 0.04) 0%, transparent 50%); background-attachment: fixed; transition: background-color 0.3s ease, color 0.3s ease; }
        .container { width: 100%; max-width: 1200px; padding: 4rem 2rem; display: flex; flex-direction: column; gap: 3rem; position: relative; z-index: 1; }
        header { display: flex; flex-direction: column; gap: 1rem; animation: fadeDown 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .eyebrow { font-family: var(--font-display); text-transform: uppercase; letter-spacing: 0.1em; color: var(--accent-primary); font-size: 0.65rem; font-weight: 600; }
        h1 { font-family: var(--font-display); font-size: clamp(3rem, 6vw, 5.5rem); font-weight: 700; line-height: 0.9; text-transform: uppercase; letter-spacing: -0.02em; }
        .subtitle { color: var(--text-secondary); font-size: 1.125rem; max-width: 500px; line-height: 1.5; }
        .status-badge { display: inline-flex; align-items: center; gap: 6px; background: var(--border-dim); padding: 4px 10px; border-radius: 100px; font-size: 0.6rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-secondary); width: fit-content; }
        .status-badge.live { color: var(--bg-base); background: var(--accent-primary); }
        .live-dot { width: 6px; height: 6px; background: currentColor; border-radius: 50%; animation: pulse 1.5s infinite; }
        .schedule { display: flex; flex-direction: column; gap: 4rem; }
        .date-group { display: flex; flex-direction: column; gap: 1.5rem; }
        .date-header { display: flex; align-items: baseline; gap: 1rem; border-bottom: 1px solid var(--border-dim); padding-bottom: 1rem; position: sticky; top: 0; background: var(--bg-base); z-index: 10; }
        .date-header h2 { font-family: var(--font-display); font-size: 2rem; font-weight: 600; color: var(--text-primary); }
        .date-header span { color: var(--text-tertiary); font-size: 1rem; }
        .match-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(100%, 1fr)); gap: 1rem; }
        .match-card { background: var(--bg-surface); border: 1px solid var(--border-dim); border-radius: var(--radius-md); padding: 1.5rem; display: grid; grid-template-columns: 120px 1fr 140px; align-items: center; gap: 2rem; transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); position: relative; overflow: hidden; animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .match-card::before { content: ''; position: absolute; left: 0; top: 0; height: 100%; width: 4px; background: var(--accent-primary); transform: scaleY(0); transform-origin: center; transition: transform 0.3s ease; }
        .match-card:hover { border-color: var(--border-bright); background: var(--bg-surface-hover); transform: translateY(-2px); box-shadow: 0 12px 24px -10px rgba(0,0,0,0.5); }
        .match-card:hover::before { transform: scaleY(1); }
        
        .match-card.bg-highlight {
            background: linear-gradient(145deg, rgba(var(--accent-rgb), 0.08) 0%, var(--bg-surface) 100%);
            border-color: rgba(var(--accent-rgb), 0.3);
            box-shadow: 0 8px 32px -12px rgba(var(--accent-rgb), 0.2);
        }
        .match-card.bg-highlight::before {
            transform: scaleY(1);
        }
        
        .next-badge {
            position: absolute;
            top: 0;
            right: 0;
            background: var(--accent-primary);
            color: var(--bg-base);
            font-size: 0.65rem;
            font-weight: 700;
            padding: 0.2rem 0.6rem;
            border-bottom-left-radius: var(--radius-sm);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-family: var(--font-display);
        }

        .time-section { display: flex; flex-direction: column; gap: 0.25rem; }
        .time { font-family: var(--font-display); font-size: 1.5rem; font-weight: 600; color: var(--text-primary); }
        .score { font-family: var(--font-display); font-size: 1.8rem; font-weight: 700; color: var(--accent-primary); letter-spacing: 0.05em; }
        .timezone { color: var(--text-secondary); font-size: 0.75rem; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; }
        .teams-section { display: flex; align-items: center; justify-content: center; gap: 1.5rem; padding: 0 2rem; border-left: 1px solid var(--border-dim); border-right: 1px solid var(--border-dim); }
        .team { display: flex; align-items: center; gap: 1rem; flex: 1; }
        .team.home { justify-content: flex-end; text-align: right; }
        .team.away { justify-content: flex-start; text-align: left; }
        .team-name { font-size: 1.25rem; font-weight: 500; color: var(--text-primary); }
        .flag { font-size: 1.5rem; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; background: #222; border-radius: 50%; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
        .vs-badge { background: var(--bg-base); border: 1px solid var(--border-dim); color: var(--text-tertiary); font-family: var(--font-display); font-size: 0.75rem; font-weight: 600; padding: 0.25rem 0.5rem; border-radius: var(--radius-sm); }
        .meta-section { display: flex; flex-direction: column; align-items: flex-end; gap: 0.5rem; text-align: right; }
        .group-tag { background: var(--border-dim); color: var(--text-secondary); font-size: 0.75rem; font-weight: 600; padding: 0.25rem 0.5rem; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.05em; }
        .venue { color: var(--text-tertiary); font-size: 0.875rem; display: flex; align-items: center; gap: 0.25rem; }
        .venue svg { width: 14px; height: 14px; fill: currentColor; }
        .status-upcoming { background: rgba(255, 255, 255, 0.1); color: var(--text-secondary); }
        
        /* Tabs */
        .desktop-tabs { display: flex; gap: 1rem; margin-top: 1.5rem; }
        .tab-btn { background: var(--bg-surface); border: 1px solid var(--border-dim); color: var(--text-secondary); padding: 0.75rem 1.5rem; border-radius: 8px; font-family: var(--font-body); font-size: 1rem; font-weight: 500; cursor: pointer; transition: all 0.3s ease; }
        .tab-btn:hover { background: var(--bg-surface-hover); border-color: var(--border-bright); color: var(--text-primary); }
        .tab-btn.active { background: rgba(var(--accent-rgb), 0.1); border-color: var(--accent-primary); color: var(--accent-primary); box-shadow: 0 0 15px rgba(var(--accent-rgb), 0.15); }
        .tab-content { animation: fadeDown 0.5s ease forwards; }

        /* Standings */
        .standings-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 2rem; }
        .group-card { background: var(--bg-surface); border: 1px solid var(--border-dim); border-radius: 16px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .group-header { background: var(--bg-surface-hover); padding: 1rem 1.5rem; font-family: var(--font-display); font-weight: 600; border-bottom: 1px solid var(--border-dim); color: var(--accent-primary); }
        .standings-table { width: 100%; border-collapse: collapse; text-align: center; }
        .standings-table th { color: var(--text-tertiary); font-size: 0.75rem; text-transform: uppercase; padding: 0.75rem 0.5rem; border-bottom: 1px solid var(--border-dim); font-weight: 500; }
        .standings-table th:first-child { text-align: left; padding-left: 1.5rem; }
        .standings-table th:last-child { padding-right: 1.5rem; }
        .standings-table td { padding: 0.75rem 0.5rem; font-size: 0.875rem; border-bottom: 1px solid var(--border-dim); }
        .standings-table tr:last-child td { border-bottom: none; }
        .standings-table td:first-child { padding-left: 1.5rem; }
        .standings-table td:last-child { padding-right: 1.5rem; }
        .team-cell { display: flex; align-items: center; gap: 0.75rem; text-align: left; font-weight: 500; color: var(--text-primary); }
        .team-flag { width: 24px; height: 16px; object-fit: cover; border-radius: 2px; }
        .pts-col { color: var(--accent-primary); font-weight: 700; }

        /* Floating Nav & Refresh */
        .mobile-nav-container { display: none; }
        .fab-btn {
            position: fixed;
            bottom: 2rem;
            right: 6rem;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--bg-surface);
            border: 1px solid var(--accent-primary);
            color: var(--accent-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 101;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            transition: all 0.3s ease;
        }
        .fab-btn:hover { transform: scale(1.05); background: rgba(var(--accent-rgb), 0.05); }
        .fab-menu {
            position: fixed;
            bottom: 6rem;
            right: 6rem;
            background: var(--bg-surface);
            border: 1px solid var(--border-dim);
            border-radius: 12px;
            padding: 0.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            z-index: 100;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 12px 48px rgba(0, 0, 0, 0.5);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            transform-origin: bottom right;
        }
        .fab-menu.hidden { opacity: 0; pointer-events: none; transform: scale(0.8) translateY(20px); }
        .fab-menu-item { background: transparent; border: none; color: var(--text-secondary); padding: 0.75rem 1.5rem; text-align: left; font-size: 1rem; font-family: var(--font-body); border-radius: 8px; cursor: pointer; transition: background 0.2s; white-space: nowrap; }
        .fab-menu-item:hover { background: var(--bg-surface-hover); color: var(--text-primary); }
        .fab-menu-item.active { color: var(--accent-primary); font-weight: 600; background: rgba(var(--accent-rgb), 0.05); }

        .refresh-btn, .theme-btn {
            position: fixed;
            bottom: 2rem;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 100;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            transition: all 0.3s ease;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }
        .refresh-btn {
            right: 2rem;
            background: rgba(var(--accent-rgb), 0.05);
            border: 1px solid rgba(var(--accent-rgb), 0.2);
            color: var(--accent-primary);
        }
        .theme-btn {
            right: 10rem;
            background: var(--bg-surface);
            border: 1px solid var(--border-dim);
            color: var(--text-primary);
        }
        .refresh-btn:hover, .refresh-btn:active {
            background: rgba(var(--accent-rgb), 0.15);
            transform: scale(1.05);
            border-color: rgba(var(--accent-rgb), 0.4);
        }
        .theme-btn:hover {
            transform: scale(1.05);
            background: var(--bg-surface-hover);
            border-color: var(--border-bright);
        }
        .refresh-btn svg { transition: transform 0.5s ease; }
        .refresh-btn:active svg { transform: rotate(180deg); }

        @keyframes fadeDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        .loader { display: flex; justify-content: center; padding: 3rem; color: var(--accent-primary); font-family: var(--font-display); letter-spacing: 0.1em; text-transform: uppercase; }
        
        #particleCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            pointer-events: none;
        }

        @media (max-width: 900px) {
            .match-card { grid-template-columns: 1fr; gap: 1.5rem; padding: 1.5rem; }
            .time-section { flex-direction: row; align-items: baseline; gap: 0.5rem; }
            .score { font-size: 2rem; }
            header h1 { font-size: 2.5rem; }
            
            .desktop-tabs { display: none; }
            .mobile-nav-container { display: block; }
            .refresh-btn { bottom: 1.5rem; right: 1.5rem; }
            .fab-btn { bottom: 1.5rem; right: 5.5rem; }
            .theme-btn { bottom: 1.5rem; right: 9.5rem; }
            .fab-menu { bottom: 5.5rem; right: 5.5rem; }
            .standings-grid { grid-template-columns: 1fr; }
            .teams-section { flex-direction: column; align-items: flex-start; padding: 0; border: none; gap: 1rem; }
            .team { width: 100%; justify-content: flex-start; text-align: left; }
            .team.home { flex-direction: row-reverse; justify-content: flex-end; }
            .vs-badge { align-self: flex-start; margin-left: 2.5rem; }
            .meta-section { align-items: flex-start; text-align: left; flex-direction: row; justify-content: space-between; border-top: 1px solid var(--border-dim); padding-top: 1rem; margin-top: 0.5rem; }
        }
    </style>
</head>
<body>
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'light') {
                document.documentElement.setAttribute('data-theme', 'light');
            }
        })();
    </script>
    <canvas id="particleCanvas"></canvas>
    
    <button id="refreshBtn" class="refresh-btn" aria-label="Refresh Page" title="Refresh Data">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/><path d="M16 21v-5h5"/></svg>
    </button>

    <button id="themeBtn" class="theme-btn" aria-label="Toggle Theme" title="Toggle Theme">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
    </button>

    <div class="mobile-nav-container">
        <button id="fabBtn" class="fab-btn" aria-label="Menu" title="Menu">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
        </button>
        <div id="fabMenu" class="fab-menu hidden">
            <button class="fab-menu-item active" data-tab="games">Games</button>
            <button class="fab-menu-item" data-tab="standings">Standings</button>
            <button class="fab-menu-item" data-tab="scorers">Top Scorers</button>
            <button class="fab-menu-item" data-tab="assists">Top Assists</button>
        </div>
    </div>

    <div class="container">
        
        <header>
            <div class="eyebrow">Powered by worldcup26.ir REST API</div>
            <h1>World Cup 26</h1>
            <p class="subtitle">Live data from the ongoing World Cup hosted by Canada, Mexico, and the United States.</p>
            <div id="statusIndicator" class="status-badge">
                <div class="live-dot"></div>
                <span>Syncing Public API...</span>
            </div>
            
            <div class="desktop-tabs">
                <button class="tab-btn active" data-tab="games">Games</button>
                <button class="tab-btn" data-tab="standings">Standings</button>
                <button class="tab-btn" data-tab="scorers">Top Scorers</button>
                <button class="tab-btn" data-tab="assists">Top Assists</button>
            </div>
        </header>

        <div id="games-tab" class="tab-content active">
            <div id="scheduleContainer" class="schedule">
                <div class="loader">Fetching from worldcup26.ir...</div>
            </div>
        </div>

        <div id="standings-tab" class="tab-content" style="display: none;">
            <div id="standings-loading" class="loader">Fetching Standings...</div>
            <div id="standings" class="standings-grid"></div>
        </div>

        <div id="scorers-tab" class="tab-content" style="display: none;">
            <div class="group-card">
                <div class="group-header">Top 10 Goal Scorers</div>
                <table class="standings-table">
                    <thead><tr><th>RK</th><th>Player</th><th>Team</th><th>Goals</th></tr></thead>
                    <tbody id="scorers-tbody"></tbody>
                </table>
            </div>
        </div>

        <div id="assists-tab" class="tab-content" style="display: none;">
            <div class="group-card">
                <div class="group-header">Top 10 Assists</div>
                <table class="standings-table">
                    <thead><tr><th>RK</th><th>Player</th><th>Team</th><th>Assists</th></tr></thead>
                    <tbody id="assists-tbody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const CACHE_KEY = 'fifa_wc2026_real_api_cache_v2';
        const STANDINGS_CACHE_KEY = 'fifa_wc2026_standings_v1';
        
        // This is the actual free public API we found for the 2026 World Cup
        const API_URL = 'https://worldcup26.ir/get/games'; 
        const GROUPS_API = 'https://worldcup26.ir/get/groups';
        const TEAMS_API = 'https://worldcup26.ir/get/teams';

        document.addEventListener('DOMContentLoaded', () => {
            initParticles();
            initApp();
            
            // Wire up the floating refresh button
            document.getElementById('refreshBtn').addEventListener('click', async (e) => {
                const btn = e.currentTarget;
                const icon = btn.querySelector('svg');
                
                // Visual feedback that sync is happening
                btn.style.pointerEvents = 'none';
                icon.style.animation = 'pulse 1s infinite';
                
                try {
                    await Promise.all([
                        fetchFreshData(),
                        fetchStandings()
                    ]);
                } catch(err) {
                    console.error('Manual sync failed:', err);
                } finally {
                    btn.style.pointerEvents = 'auto';
                    icon.style.animation = 'none';
                }
            });

            // Auto-sync every 2 minutes
            setInterval(async () => {
                try {
                    await Promise.all([
                        fetchFreshData(),
                        fetchStandings()
                    ]);
                } catch(err) {
                    console.error('Auto-sync failed:', err);
                }
            }, 2 * 60 * 1000);

            // Tab Switching Logic
            document.querySelectorAll('.tab-btn, .fab-menu-item').forEach(btn => {
                btn.addEventListener('click', (e) => switchTab(e.target.dataset.tab));
            });

            // Mobile FAB Toggle
            document.getElementById('fabBtn').addEventListener('click', () => {
                document.getElementById('fabMenu').classList.toggle('hidden');
            });
            
            // Theme Toggle Logic
            document.getElementById('themeBtn').addEventListener('click', () => {
                const isLight = document.documentElement.getAttribute('data-theme') === 'light';
                const newTheme = isLight ? 'dark' : 'light';
                document.documentElement.setAttribute('data-theme', newTheme);
                localStorage.setItem('theme', newTheme);
            });
            
            // Render static player stats
            renderPlayerStats();
        });

        const MOCK_STATS = {
            scorers: [
                { rank: 1, name: "Ladislav Krejcí", team: "Czechia", stat: 1 },
                { rank: 2, name: "Hwang In-Beom", team: "South Korea", stat: 1 },
                { rank: 3, name: "Julián Quiñones", team: "Mexico", stat: 1 },
                { rank: 4, name: "Raúl Jiménez", team: "Mexico", stat: 1 },
                { rank: 5, name: "Oh Hyeon-Gyu", team: "South Korea", stat: 1 },
                { rank: 6, name: "Mbekezeli Mbokazi", team: "South Africa", stat: 1 },
                { rank: 7, name: "Stepán Chaloupek", team: "Czechia", stat: 1 },
                { rank: 8, name: "Ime Okon", team: "South Africa", stat: 1 },
                { rank: 9, name: "Lee Gi-Hyuk", team: "South Korea", stat: 1 },
                { rank: 10, name: "Robin Hranác", team: "Czechia", stat: 1 }
            ],
            assists: [
                { rank: 1, name: "Son Heung-Min", team: "South Korea", stat: 1 },
                { rank: 2, name: "Edson Álvarez", team: "Mexico", stat: 1 },
                { rank: 3, name: "Tomáš Souček", team: "Czechia", stat: 1 },
                { rank: 4, name: "Percy Tau", team: "South Africa", stat: 1 },
                { rank: 5, name: "Hirving Lozano", team: "Mexico", stat: 1 },
                { rank: 6, name: "Teboho Mokoena", team: "South Africa", stat: 1 },
                { rank: 7, name: "Lee Kang-In", team: "South Korea", stat: 1 },
                { rank: 8, name: "Uriel Antuna", team: "Mexico", stat: 1 },
                { rank: 9, name: "Vladimír Coufal", team: "Czechia", stat: 1 },
                { rank: 10, name: "Johan Vásquez", team: "Mexico", stat: 1 }
            ]
        };

        function renderPlayerStats() {
            const scorersHtml = MOCK_STATS.scorers.map(p => `
                <tr>
                    <td style="color:var(--text-secondary)">${p.rank}</td>
                    <td style="color:var(--text-primary); font-weight:500">${p.name}</td>
                    <td>${p.team}</td>
                    <td class="pts-col">${p.stat}</td>
                </tr>
            `).join('');
            document.getElementById('scorers-tbody').innerHTML = scorersHtml;

            const assistsHtml = MOCK_STATS.assists.map(p => `
                <tr>
                    <td style="color:var(--text-secondary)">${p.rank}</td>
                    <td style="color:var(--text-primary); font-weight:500">${p.name}</td>
                    <td>${p.team}</td>
                    <td class="pts-col">${p.stat}</td>
                </tr>
            `).join('');
            document.getElementById('assists-tbody').innerHTML = assistsHtml;
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-btn, .fab-menu-item').forEach(btn => {
                if (btn.dataset.tab === tabId) btn.classList.add('active');
                else btn.classList.remove('active');
            });
            
            document.querySelectorAll('.tab-content').forEach(content => {
                if (content.id === `${tabId}-tab`) {
                    content.style.display = 'block';
                    content.style.animation = 'none';
                    content.offsetHeight; // trigger reflow
                    content.style.animation = null; 
                } else {
                    content.style.display = 'none';
                }
            });

            document.getElementById('fabMenu').classList.add('hidden');
        }

        function initParticles() {
            const canvas = document.getElementById('particleCanvas');
            const ctx = canvas.getContext('2d');
            let width, height;

            function resize() {
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width;
                canvas.height = height;
            }

            window.addEventListener('resize', resize);
            resize();

            let accentRGB = window.getComputedStyle(document.documentElement).getPropertyValue('--accent-rgb').trim();
            const observer = new MutationObserver(() => {
                accentRGB = window.getComputedStyle(document.documentElement).getPropertyValue('--accent-rgb').trim();
            });
            observer.observe(document.documentElement, { attributes: true, attributeFilter: ['data-theme'] });

            class Comet {
                constructor() {
                    this.reset();
                    // Randomize initial positions thoroughly
                    this.x = Math.random() * width;
                    this.y = Math.random() * height;
                }

                reset() {
                    this.x = Math.random() * width;
                    this.y = Math.random() * height;
                    const angle = Math.random() * Math.PI * 2;
                    const speed = Math.random() * 1.5 + 1; // Smooth, organic speed
                    this.vx = Math.cos(angle) * speed;
                    this.vy = Math.sin(angle) * speed;
                    
                    this.history = [];
                    this.maxHistory = 60; // Smooth fading tail length
                    this.wobble = Math.random() * Math.PI * 2; // For organic movement
                }

                update() {
                    this.history.unshift({ x: this.x, y: this.y });
                    if (this.history.length > this.maxHistory) {
                        this.history.pop();
                    }

                    // Add a tiny bit of organic wobble to the trajectory so it's not perfectly straight
                    this.wobble += 0.05;
                    const currentVx = this.vx + Math.cos(this.wobble) * 0.2;
                    const currentVy = this.vy + Math.sin(this.wobble) * 0.2;

                    this.x += currentVx;
                    this.y += currentVy;

                    // Smooth bounce off edges
                    if (this.x < 0 || this.x > width) this.vx *= -1;
                    if (this.y < 0 || this.y > height) this.vy *= -1;
                }

                draw() {
                    if (this.history.length < 2) return;
                    
                    ctx.lineCap = 'round';
                    ctx.lineJoin = 'round';

                    // Draw tail
                    for (let i = 0; i < this.history.length - 1; i++) {
                        ctx.beginPath();
                        ctx.moveTo(this.history[i].x, this.history[i].y);
                        ctx.lineTo(this.history[i+1].x, this.history[i+1].y);
                        
                        // Softer fade
                        const opacity = Math.max(0, 1 - (i / this.history.length));
                        ctx.strokeStyle = `rgba(${accentRGB}, ${opacity * 0.12})`; // Dynamic tail color
                        ctx.lineWidth = 1.5; // Thinner lines
                        ctx.stroke();
                    }

                    // Draw head with softer glow
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, 1.8, 0, Math.PI * 2); // Smaller head
                    ctx.fillStyle = `rgba(${accentRGB}, 0.4)`; // Dynamic head color
                    ctx.shadowBlur = 8;
                    ctx.shadowColor = `rgba(${accentRGB}, 0.3)`;
                    ctx.fill();
                    ctx.shadowBlur = 0; // Reset
                }
            }

            const comets = [];
            const cometCount = 15; // Increased number of comets
            for (let i = 0; i < cometCount; i++) {
                comets.push(new Comet());
            }

            function animate() {
                ctx.clearRect(0, 0, width, height);
                for (const comet of comets) {
                    comet.update();
                    comet.draw();
                }
                requestAnimationFrame(animate);
            }
            animate();
        }

        async function initApp() {
            // 1. Try to load from localStorage first for instant render
            const cachedData = localStorage.getItem(CACHE_KEY);
            if (cachedData) {
                renderSchedule(JSON.parse(cachedData));
                updateStatus('Cached Data Loaded', false);
            }
            
            const cachedStandings = localStorage.getItem(STANDINGS_CACHE_KEY);
            if (cachedStandings) {
                renderStandings(JSON.parse(cachedStandings));
                document.getElementById('standings-loading').style.display = 'none';
            }

            // 2. Fetch fresh data from the real API
            await Promise.all([
                fetchFreshData(),
                fetchStandings()
            ]);
        }

        async function fetchStandings() {
            try {
                const [groupsRes, teamsRes] = await Promise.all([
                    fetch(GROUPS_API),
                    fetch(TEAMS_API)
                ]);
                
                if (!groupsRes.ok || !teamsRes.ok) throw new Error('Standings API fetch failed');
                
                const groupsData = await groupsRes.json();
                const teamsData = await teamsRes.json();

                const teamMap = {};
                if (teamsData && teamsData.teams) {
                    teamsData.teams.forEach(t => {
                        teamMap[t.id] = { name: t.name_en, flag: t.flag };
                    });
                }

                if (groupsData && groupsData.groups) {
                    const enrichedGroups = groupsData.groups.map(g => {
                        return {
                            name: g.name,
                            teams: g.teams.map(t => ({
                                ...t,
                                teamName: teamMap[t.team_id]?.name || 'TBD',
                                teamFlag: teamMap[t.team_id]?.flag || ''
                            }))
                        };
                    });

                    enrichedGroups.sort((a, b) => a.name.localeCompare(b.name));
                    localStorage.setItem(STANDINGS_CACHE_KEY, JSON.stringify(enrichedGroups));
                    renderStandings(enrichedGroups);
                }
            } catch(e) {
                console.error('Failed to fetch standings:', e);
                if (!localStorage.getItem(STANDINGS_CACHE_KEY)) {
                    document.getElementById('standings').innerHTML = '<div style="grid-column: 1/-1; text-align:center; color: var(--text-secondary)">Standings unavailable offline.</div>';
                }
            } finally {
                document.getElementById('standings-loading').style.display = 'none';
            }
        }

        function renderStandings(groups) {
            const container = document.getElementById('standings');
            container.innerHTML = '';
            
            groups.forEach(g => {
                const card = document.createElement('div');
                card.className = 'group-card';
                
                let rowsHTML = '';
                g.teams.forEach(t => {
                    const flagHTML = t.teamFlag ? `<img src="${t.teamFlag}" class="team-flag" alt="${t.teamName} flag" />` : '<div class="team-flag" style="background:#333"></div>';
                    rowsHTML += `
                        <tr>
                            <td>
                                <div class="team-cell">
                                    ${flagHTML}
                                    <span>${t.teamName}</span>
                                </div>
                            </td>
                            <td>${t.mp}</td>
                            <td>${t.gf}</td>
                            <td>${t.ga}</td>
                            <td>${t.gd}</td>
                            <td class="pts-col">${t.pts}</td>
                        </tr>
                    `;
                });

                card.innerHTML = `
                    <div class="group-header">Group ${g.name}</div>
                    <table class="standings-table">
                        <thead>
                            <tr>
                                <th>Team</th>
                                <th>MP</th>
                                <th>GF</th>
                                <th>GA</th>
                                <th>GD</th>
                                <th>PTS</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${rowsHTML}
                        </tbody>
                    </table>
                `;
                container.appendChild(card);
            });
        }

        async function fetchFreshData() {
            try {
                updateStatus('Syncing Live Data...', true);
                
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error(`API fetch failed with status ${response.status}`);
                const data = await response.json();

                // Process the raw API JSON into our UI groupings
                const transformedData = processApiData(data.games);

                // 3. Save to LocalStorage
                localStorage.setItem(CACHE_KEY, JSON.stringify(transformedData));
                
                // 4. Update UI
                renderSchedule(transformedData);
                
                updateStatus('Live & Synced via API', true);

            } catch (error) {
                console.error("Failed to fetch fresh matches from worldcup26.ir:", error);
                if (!localStorage.getItem(CACHE_KEY)) {
                    document.getElementById('scheduleContainer').innerHTML = 
                        '<div class="loader" style="color:var(--text-tertiary)">Unable to connect to the public API. Please check your internet connection or CORS settings.</div>';
                }
                updateStatus('Offline Mode (API Unavailable)', false);
            }
        }

        // Helper function to get an emoji flag
        function getFlagForTeam(teamName) {
            const flags = {
                'Mexico': '🇲🇽', 'South Africa': '🇿🇦', 'South Korea': '🇰🇷', 'Czech Republic': '🇨🇿', 
                'Canada': '🇨🇦', 'USA': '🇺🇸', 'Qatar': '🇶🇦', 'Switzerland': '🇨🇭', 'Brazil': '🇧🇷',
                'Morocco': '🇲🇦', 'Haiti': '🇭🇹', 'Scotland': '🏴󠁧󠁢󠁳󠁣󠁴󠁿', 'Australia': '🇦🇺', 'Turkey': '🇹🇷'
            };
            return flags[teamName] || '⚽';
        }

        function processApiData(gamesArray) {
            // Filter to show all Group Stage games
            const groupGames = gamesArray.filter(g => g.type === 'group');
            
            const grouped = {};
            let nextGameFound = false;

            // Map of stadium ID to its UTC offset during June/July 2026
            const stadiumOffsets = {
                "1": "-06:00", // Mexico City (No DST)
                "2": "-06:00", // Guadalajara (No DST)
                "3": "-06:00", // Monterrey (No DST)
                "4": "-05:00", // Dallas (CDT)
                "5": "-05:00", // Houston (CDT)
                "6": "-05:00", // Kansas City (CDT)
                "7": "-04:00", // Atlanta (EDT)
                "8": "-04:00", // Miami (EDT)
                "9": "-04:00", // Boston (EDT)
                "10": "-04:00", // Philadelphia (EDT)
                "11": "-04:00", // New York (EDT)
                "12": "-04:00", // Toronto (EDT)
                "13": "-07:00", // Vancouver (PDT)
                "14": "-07:00", // Seattle (PDT)
                "15": "-07:00", // San Francisco (PDT)
                "16": "-07:00"  // Los Angeles (PDT)
            };

            groupGames.forEach(game => {
                // local_date from API is "MM/DD/YYYY HH:MM" in stadium's local time
                // We format it into ISO 8601 with the correct UTC offset: "YYYY-MM-DDTHH:MM:00-0X:00"
                const [datePart, timePart] = game.local_date.split(' ');
                const [month, day, year] = datePart.split('/');
                const offset = stadiumOffsets[game.stadium_id] || "-04:00"; // fallback to EDT
                
                const isoString = `${year}-${month}-${day}T${timePart}:00${offset}`;
                const dateObj = new Date(isoString);
                
                // Force output to West Africa Time (WAT) using Africa/Lagos timezone
                const dateStr = dateObj.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', timeZone: 'Africa/Lagos' });
                const timeStr = dateObj.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', timeZone: 'Africa/Lagos' });

                if (!grouped[dateStr]) {
                    grouped[dateStr] = {
                        dateGroup: dateStr,
                        matchday: 'Matchday ' + game.matchday,
                        matches: []
                    };
                }

                let matchStatus = 'upcoming';
                if (game.finished === 'TRUE') matchStatus = 'completed';
                else if (game.time_elapsed !== 'notstarted') matchStatus = 'live';

                let isNext = false;
                if (matchStatus === 'upcoming' && !nextGameFound) {
                    // Make sure the absolute date is actually in the future compared to now
                    if (dateObj > new Date()) {
                        isNext = true;
                        nextGameFound = true;
                    }
                }

                grouped[dateStr].matches.push({
                    time: timeStr,
                    status: matchStatus,
                    isNext: isNext,
                    homeTeam: game.home_team_name_en || game.home_team_label || 'TBD',
                    homeFlag: getFlagForTeam(game.home_team_name_en),
                    awayTeam: game.away_team_name_en || game.away_team_label || 'TBD',
                    awayFlag: getFlagForTeam(game.away_team_name_en),
                    group: 'Group ' + game.group,
                    venue: 'Stadium ' + game.stadium_id,
                    homeScore: game.home_score,
                    awayScore: game.away_score
                });
            });

            return Object.values(grouped);
        }

        function updateStatus(text, isLive) {
            const statusEl = document.getElementById('statusIndicator');
            const dot = isLive ? '<div class="live-dot"></div>' : '';
            statusEl.innerHTML = `${dot}<span>${text}</span>`;
            if (isLive) {
                statusEl.classList.add('live');
            } else {
                statusEl.classList.remove('live');
            }
        }

        function renderSchedule(scheduleData) {
            const container = document.getElementById('scheduleContainer');
            container.innerHTML = ''; 

            scheduleData.forEach(dayGroup => {
                const groupDiv = document.createElement('div');
                groupDiv.className = 'date-group';
                
                let matchesHTML = '';
                dayGroup.matches.forEach(match => {
                    let timeOrScoreHTML = '';
                    if (match.status === 'completed' || match.status === 'live') {
                        timeOrScoreHTML = `<span class="score">${match.homeScore} - ${match.awayScore}</span>
                                           <span class="timezone">${match.status === 'live' ? '<span style="color:#e11d48">LIVE</span>' : 'FT'}</span>`;
                    } else {
                        timeOrScoreHTML = `<span class="time">${match.time}</span>
                                           <span class="timezone">WAT</span>`;
                    }

                    const highlightClass = match.isNext ? ' bg-highlight' : '';
                    const nextBadgeHTML = match.isNext ? '<div class="next-badge">Up Next</div>' : '';

                    matchesHTML += `
                        <div class="match-card${highlightClass}">
                            ${nextBadgeHTML}
                            <div class="time-section">
                                ${timeOrScoreHTML}
                            </div>
                            <div class="teams-section">
                                <div class="team home">
                                    <span class="team-name">${match.homeTeam}</span>
                                    <span class="flag">${match.homeFlag}</span>
                                </div>
                                <span class="vs-badge">VS</span>
                                <div class="team away">
                                    <span class="flag">${match.awayFlag}</span>
                                    <span class="team-name">${match.awayTeam}</span>
                                </div>
                            </div>
                            <div class="meta-section">
                                <span class="group-tag">${match.group}</span>
                                <span class="venue">
                                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
                                    ${match.venue}
                                </span>
                            </div>
                        </div>
                    `;
                });

                groupDiv.innerHTML = `
                    <div class="date-header">
                        <h2>${dayGroup.dateGroup}</h2>
                        <span>${dayGroup.matchday}</span>
                    </div>
                    <div class="match-list">
                        ${matchesHTML}
                    </div>
                `;

                container.appendChild(groupDiv);
            });
        }

        // Register Service Worker for PWA Offline Support
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(registration => {
                        console.log('ServiceWorker registration successful with scope: ', registration.scope);
                    })
                    .catch(err => {
                        console.log('ServiceWorker registration failed: ', err);
                    });
            });
        }
    </script>
